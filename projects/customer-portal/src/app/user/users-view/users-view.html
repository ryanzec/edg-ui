@if (usersError()) {
  <org-card class="mb-2" color="danger">
    <org-card-header title="Error" />
    <org-card-content>
      <div>{{ usersError() }}</div>
    </org-card-content>
  </org-card>
}

<org-users-list
  (editUser)="onEditUser($event)"
  (deleteUser)="onDeleteUser($event)"
  (bulkDeleteUsers)="onBulkDeleteUsers($event)"
  (inviteMemberClicked)="onInviteMemberClick()"
/>

<org-user-form-dialog #userFormDialog position="right" (closed)="clearSelectedUser()" />

<org-user-delete-dialog #userDeleteDialog position="center" (closed)="clearSelectedUser()" />
