$schema: https://moonrepo.dev/schemas/project.json
tasks:
  type-check:
    command: $workspaceRoot/node_modules/.bin/tsc --project $workspaceRoot/tsconfig.json
    inputs:
    - '**/*'
    - /tsconfig.json
    env:
      NODE_ENV: development
    options:
      runFromWorkspaceRoot: false
language: typescript
layer: library
