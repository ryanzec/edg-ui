<org-box layout="stack">
  <org-box-header title="Bio" subtitle="Markdown supported. Visible to everyone in the workspace." />
  <org-box-content>
    <div [formGroup]="formGroup()">
      <org-form-field [validationMessage]="errors().body">
        <org-textarea name="user-details-bio-body" formControlName="body" [minLines]="3" [maxLines]="6" />
      </org-form-field>
      <div>
        <span>{{ currentLength() }} / {{ bio().maxLength }} characters</span>
        <span>**bold** _italic_ `code` supported</span>
      </div>
    </div>
  </org-box-content>
</org-box>
