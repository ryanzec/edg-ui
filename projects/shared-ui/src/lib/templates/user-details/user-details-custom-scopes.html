<org-card>
  <org-card-header
    title="Custom scopes"
    subtitle="Additive permissions beyond the role. Use sparingly — most users don't need any."
  />
  <org-card-content>
    <div class="custom-scopes-body flex flex-col gap-3">
      <div class="chips-row flex items-center gap-2 flex-wrap">
        @for (scope of scopes(); track scope.id) {
          <org-tag [color]="scope.color">{{ scope.label }}</org-tag>
        }
      </div>

      <div class="add-row flex items-center gap-2">
        <org-input
          name="user-details-new-scope"
          placeholder="e.g. write:projects"
          preIcon="code"
          [(value)]="newScopeValue"
          [inlineItems]="inlineItems()"
          (inlineItemRemoved)="onInlineItemRemoved($event)"
        />
        <org-button variant="ghost" color="neutral" preIcon="plus" label="Add scope" (clicked)="onAddScopeClicked()" />
      </div>

      <div class="suggested-row flex items-center gap-2 flex-wrap">
        <span class="text-xs text-muted">Suggested:</span>
        @for (suggestion of suggestedScopes(); track suggestion) {
          <button type="button" class="suggested-chip-button" (click)="onSuggestedClicked(suggestion)">
            <org-tag color="neutral" size="xs">+ {{ suggestion }}</org-tag>
          </button>
        }
      </div>
    </div>
  </org-card-content>
</org-card>
