<org-box layout="stack">
  <org-box-header title="Password" [subtitle]="subtitle()">
    <ng-template #actions>
      <org-button
        variant="ghost"
        color="neutral"
        preIcon="lock-keyhole"
        label="Change password"
        (clicked)="onChangePasswordClicked()"
      />
    </ng-template>
  </org-box-header>
  <org-box-content>
    <div class="password-body flex items-center gap-3">
      <org-tag [color]="strengthColor()">
        <span>&#10003; {{ strengthLabel() }}</span>
      </org-tag>
      <span class="text-sm text-muted">{{ rotationLine() }}</span>
    </div>
  </org-box-content>
</org-box>
