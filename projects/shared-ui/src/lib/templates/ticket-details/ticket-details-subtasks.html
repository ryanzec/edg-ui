<org-card [isExpandable]="true" [(isExpanded)]="isExpanded">
  <org-card-header title="Subtasks">
    <span post class="text-xs text-muted">{{ fractionLabel() }}</span>
  </org-card-header>
  <org-card-content>
    <div class="flex flex-col gap-2">
      @for (subtask of subtasks(); track subtask.id) {
        <button
          type="button"
          class="row flex items-center gap-2 p-1 rounded-sm"
          [attr.data-completed]="subtask.completed ? '' : null"
          (click)="onToggleSubtask(subtask)"
        >
          <org-icon
            [name]="subtask.completed ? 'circle-check-big' : 'circle'"
            size="sm"
            [color]="subtask.completed ? 'safe' : 'neutral'"
          />
          <span class="code text-xs text-muted">{{ subtask.code }}</span>
          <span class="label flex-1 text-left">{{ subtask.title }}</span>
        </button>
      }
      <org-button variant="text" color="neutral" preIcon="plus" label="Add subtask" (clicked)="onAddSubtaskClicked()" />
    </div>
  </org-card-content>
</org-card>
