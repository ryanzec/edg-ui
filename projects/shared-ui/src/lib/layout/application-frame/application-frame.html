<org-application-navigation
  [currentOrganization]="layoutStore.currentOrganization()"
  [availableOrganizations]="layoutStore.availableOrganizations()"
  [navigationItems]="layoutStore.navigationItems()"
  [groupedNavigationItems]="layoutStore.groupedNavigationItems()"
  [settingsMenuItems]="layoutStore.settingsMenuItems()"
  [collapsed]="layoutStore.collapsed()"
  (collapsedChange)="onCollapsedChange($event)"
  [theme]="theme()"
  (themeChange)="onThemeChange($event)"
  [userName]="layoutStore.userName()"
  [userEmail]="layoutStore.userEmail()"
  [userStatusColor]="layoutStore.userStatusColor()"
  (availableOrganizationSelected)="onAvailableOrganizationSelected($event)"
  (navigationItemClicked)="onNavigationItemClicked($event)"
  (subNavigationItemClicked)="onSubNavigationItemClicked($event)"
  (settingsMenuItemClicked)="onSettingsMenuItemClicked($event)"
  (logout)="onLogout()"
/>
<div class="flex-1 min-w-0">
  <org-scroll-area spacingClass="p-main-content" scrollClass="">
    <ng-content />
  </org-scroll-area>
</div>
