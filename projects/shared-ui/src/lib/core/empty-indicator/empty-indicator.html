<org-box
  class="org-empty-indicator"
  [color]="boxColor()"
  [border]="boxBorder()"
  [padding]="boxPadding()"
  [background]="boxBackground()"
>
  <ng-content select="org-empty-indicator-icon" />

  <h3 class="header">{{ header() }}</h3>

  @if (description()) {
    <p class="description">{{ description() }}</p>
  }

  @if (hasActionButton()) {
    <org-button color="primary" [label]="actionLabel()!" (clicked)="brain.triggerAction()" />
  }
</org-box>
