<div class="section first-section" [style.flex-basis]="brain.firstSectionSize() + '%'">
  @if (firstSectionTemplate(); as template) {
    <ng-container [ngTemplateOutlet]="template" />
  }
</div>
<div
  class="splitter-divider"
  orgDividerBrain
  [direction]="brain.dividerDirection()"
  [isResizable]="true"
  [value]="brain.firstSectionSize()"
  [min]="0"
  [max]="100"
  [isInteractive]="brain.isDraggable()"
  (pointerDown)="brain.onDividerPointerDown($event)"
  (pointerMove)="brain.onDividerPointerMove($event)"
  (pointerUp)="brain.onDividerPointerUp($event)"
  (pointerCancel)="brain.onDividerPointerCancel()"
  (keyDown)="brain.onDividerKeyDown($event)"
></div>
<div class="section second-section">
  @if (secondSectionTemplate(); as template) {
    <ng-container [ngTemplateOutlet]="template" />
  }
</div>
