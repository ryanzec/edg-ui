@for (notification of notifications(); track notification.id) {
  <org-notification-item
    [id]="notification.id"
    [autoCloseIn]="notification.autoCloseIn"
    [color]="notification.color"
    [title]="notification.title"
    [message]="notification.message"
    [contentTemplate]="notification.contentTemplate"
    [actionsTemplate]="notification.actionsTemplate"
    [icon]="notification.icon"
    [avatarUrl]="notification.avatarUrl"
    [canClose]="notification.canClose"
    [resetTimerOnHover]="notification.resetTimerOnHover ?? false"
    (closed)="onClosed($event)"
  />
}
