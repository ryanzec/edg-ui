<org-card [color]="color() ?? null">
  <org-card-content>
    <div class="content-row">
      <div class="message">
        @if (contentTemplate(); as template) {
          <ng-container *ngTemplateOutlet="template; context: { $implicit: brain.id() }" />
        } @else {
          {{ message() }}
        }
      </div>
      @if (canClose()) {
        <org-button
          variant="text"
          color="neutral"
          [excludeSpacing]="true"
          [attr.aria-label]="brain.closeButtonAriaLabel()"
          (click)="startClose()"
        >
          <org-button-icon name="x" />
        </org-button>
      }
    </div>
  </org-card-content>
</org-card>
