<org-card [color]="color() ?? null">
  <org-card-content>
    <div class="content-row">
      <div class="message">
        @if (contentTemplate(); as template) {
          <ng-container *ngTemplateOutlet="template; context: { $implicit: brain.id() }" />
        } @else {
          {{ message() }}
        }
      </div>
      @if (canClose()) {
        <org-button
          variant="text"
          color="neutral"
          [iconOnly]="true"
          [excludeSpacing]="true"
          [label]="brain.closeButtonAriaLabel()"
          [ariaLabel]="brain.closeButtonAriaLabel()"
          preIcon="x"
          (click)="startClose()"
        />
      }
    </div>
  </org-card-content>
</org-card>
