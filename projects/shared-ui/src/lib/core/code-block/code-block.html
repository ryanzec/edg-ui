@if (brain.variant() === 'block') {
  @if (hasHeader()) {
    <div class="header">
      <span class="header-label">
        @if (headerIcon()) {
          <org-icon class="header-icon" [name]="headerIcon()!" size="xs" />
        }
        <span class="header-label-text">{{ headerLabel() }}</span>
      </span>
      <span class="header-spacer"></span>
      @if (brain.canCopy()) {
        <org-button
          class="copy"
          variant="text"
          color="neutral"
          size="sm"
          [iconOnly]="true"
          [preIcon]="brain.isCopied() ? 'check' : 'copy'"
          [ariaLabel]="brain.copyAriaLabel()"
          [label]="brain.copyAriaLabel()"
          (clicked)="brain.copy()"
        />
      }
    </div>
  } @else if (brain.canCopy()) {
    <org-button
      class="copy floating"
      variant="text"
      color="neutral"
      size="sm"
      [iconOnly]="true"
      [preIcon]="brain.isCopied() ? 'check' : 'copy'"
      [ariaLabel]="brain.copyAriaLabel()"
      [label]="brain.copyAriaLabel()"
      (clicked)="brain.copy()"
    />
  }
  <div #bodyRef class="body" [style.--ellipsis-lines]="brain.hasEllipsis() ? brain.ellipsisAt() : null">
    <org-scroll-area direction="both" [onlyShowOnHover]="true" [scrollClass]="scrollClass()">
      <pre class="pre"><code>{{ brain.text() }}</code></pre>
    </org-scroll-area>
  </div>
  @if (brain.showShowMore()) {
    <org-button
      class="show-more"
      variant="soft"
      color="neutral"
      size="sm"
      label="{{ showMoreLabel() }}"
      [ariaExpanded]="brain.showMoreAriaExpanded()"
      (clicked)="brain.toggleExpanded()"
    />
  }
} @else if (brain.variant() === 'inline') {
  <code class="inline">{{ brain.text() }}</code>
}
