@if (brain.variant() === 'block') {
  <div class="code-block-copy-wrapper">
    @if (brain.canCopy()) {
      <button
        [type]="brain.copyButtonType"
        class="code-block-copy-btn"
        (click)="brain.copy()"
        [attr.aria-label]="brain.copyAriaLabel()"
      >
        <org-icon name="copy" />
      </button>
    }
  </div>
  <div class="code-block-body">
    <org-scroll-area direction="both" [onlyShowOnHover]="true" [scrollClass]="scrollClass()" spacingClass="p-2">
      <pre
        class="code-block-pre"
        [style]="hasEllipsis() ? { '--ellipsis-lines': ellipsisAt() } : null"
      ><code>{{ brain.text() }}</code></pre>
    </org-scroll-area>
  </div>
} @else if (brain.variant() === 'inline') {
  <code class="code-block-inline">{{ brain.text() }}</code>
}
