<label
  orgCheckboxToggleBrain
  orgText
  [textSize]="textSize()"
  [checked]="checked()"
  [disabled]="isDisabled()"
  (changed)="onBrainChanged($event)"
  (touched)="onBrainTouched()"
  class="checkbox-toggle-container"
>
  <input
    type="checkbox"
    [name]="name()"
    [value]="value()"
    [checked]="checked()"
    [disabled]="isDisabled()"
    [attr.aria-hidden]="true"
    tabindex="-1"
    class="native-input"
  />
  <div class="checkbox-toggle-track">
    <div class="checkbox-toggle-thumb">
      @if (displayIcon()) {
        <org-icon [name]="displayIcon()!" [size]="iconSize()" class="checkbox-toggle-icon" />
      }
    </div>
  </div>
  <ng-content />
</label>
