<input
  type="radio"
  [name]="finalName()"
  [value]="brain.value()"
  [checked]="isChecked()"
  [attr.aria-hidden]="true"
  tabindex="-1"
  class="native-input"
/>
<div class="radio-icon-container">
  <org-icon [name]="currentIcon()" [size]="size()" />
</div>
<span orgText [textSize]="textSize()" class="radio-content">
  <ng-content />
</span>
