<div class="pagination-nav">
  <div class="result-text">{{ resultText() }}</div>
  <org-pagination-navigation />
  <org-drop-down-selector
    size="sm"
    selectionMode="single"
    [label]="brain.itemsPerPageAriaLabel()"
    [items]="brain.itemsPerPageSelectionItems()"
    [selectedItems]="brain.itemsPerPageSelectedItems()"
    [disabled]="brain.itemsPerPageSelectDisabled()"
    (selectedItemsChange)="brain.handleItemsPerPageSelectionChange($event)"
  />
</div>
