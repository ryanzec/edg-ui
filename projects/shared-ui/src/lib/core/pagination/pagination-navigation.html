<org-button
  size="sm"
  color="neutral"
  [iconOnly]="true"
  [ariaLabel]="brain.firstPageAriaLabel()"
  [disabled]="brain.firstPageDisabled()"
  (clicked)="brain.goToFirstPage()"
>
  <org-button-icon name="chevron-first" />
</org-button>
<org-button
  size="sm"
  color="neutral"
  [iconOnly]="true"
  [ariaLabel]="brain.previousPageAriaLabel()"
  [disabled]="brain.previousPageDisabled()"
  (clicked)="brain.goToPreviousPage()"
>
  <org-button-icon name="chevron-left" />
</org-button>
@for (page of brain.visiblePageItems(); track page.value || 'ellipsis-' + $index) {
  @if (page.type === 'ellipsis') {
    <span class="ellipsis" [attr.aria-hidden]="brain.ellipsisAriaHidden">...</span>
  } @else {
    <org-button
      size="sm"
      [color]="page.isActive ? 'primary' : 'neutral'"
      [disabled]="brain.disabled()"
      [attr.aria-current]="page.isActive ? 'page' : null"
      [ariaLabel]="brain.pageButtonAriaLabel(page.value!)"
      (clicked)="brain.goToPage(page.value!)"
      class="page-button"
    >
      {{ page.value }}
    </org-button>
  }
}
<org-button
  size="sm"
  color="neutral"
  [iconOnly]="true"
  [ariaLabel]="brain.nextPageAriaLabel()"
  [disabled]="brain.nextPageDisabled()"
  (clicked)="brain.goToNextPage()"
>
  <org-button-icon name="chevron-right" />
</org-button>
<org-button
  size="sm"
  color="neutral"
  [iconOnly]="true"
  [ariaLabel]="brain.lastPageAriaLabel()"
  [disabled]="brain.lastPageDisabled()"
  (clicked)="brain.goToLastPage()"
>
  <org-button-icon name="chevron-last" />
</org-button>
