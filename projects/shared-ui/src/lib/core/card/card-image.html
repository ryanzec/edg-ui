@let heightValue = height();
@let widthValue = width();

@if (heightValue && widthValue) {
  <img
    [ngSrc]="cardImageBrainDirective.src()"
    [alt]="cardImageBrainDirective.alt()"
    [width]="widthValue"
    [height]="heightValue"
    [priority]="priority()"
  />
} @else {
  <img [ngSrc]="cardImageBrainDirective.src()" [alt]="cardImageBrainDirective.alt()" fill [priority]="priority()" />
}
