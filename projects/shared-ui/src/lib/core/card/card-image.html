@if (mode() === 'fill') {
  <img
    [ngSrc]="cardImageBrainDirective.src()"
    [alt]="cardImageBrainDirective.alt()"
    fill
    [priority]="priority()"
  />
} @else {
  <img
    [ngSrc]="cardImageBrainDirective.src()"
    [alt]="cardImageBrainDirective.alt()"
    [width]="width()!"
    [height]="height()!"
    [priority]="priority()"
  />
}
