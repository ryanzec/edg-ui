<button
  type="button"
  cdkOverlayOrigin
  #trigger="cdkOverlayOrigin"
  [disabled]="brain.disabled()"
  [attr.aria-label]="brain.label()"
  aria-haspopup="listbox"
  [attr.aria-expanded]="brain.isOpen()"
  [attr.aria-controls]="brain.isOpen() ? brain.panelId() : null"
  [attr.aria-activedescendant]="brain.activeDescendantId()"
  (click)="brain.handleTriggerClick()"
  (keydown)="brain.handleTriggerKeyDown($event)"
  class="trigger-button"
>
  @if (iconName(); as leadingIconName) {
    <org-icon [name]="leadingIconName" [size]="triggerIconSize()" />
  }
  <span class="trigger-label">{{ displayLabel() }}</span>
  <org-icon name="chevron-down" [size]="triggerIconSize()" />
</button>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="brain.isOpen()"
  [cdkConnectedOverlayPositions]="menuPositions()"
  [cdkConnectedOverlayHasBackdrop]="true"
  [cdkConnectedOverlayBackdropClass]="'cdk-overlay-transparent-backdrop'"
  [cdkConnectedOverlayPanelClass]="'org-drop-down-selector-overlay'"
  (backdropClick)="brain.handleBackdropClick()"
>
  <div
    [id]="brain.panelId()"
    role="listbox"
    [attr.aria-label]="brain.label()"
    [attr.aria-multiselectable]="brain.selectionMode() === 'multiple'"
    class="menu-panel"
  >
    <org-scroll-area scrollClass="h-full w-full">
      <org-list listRole="none">
        @for (item of brain.items(); track $index) {
          @let isItemSelected = brain.isSelected(item);
          <button
            type="button"
            role="option"
            [id]="brain.getItemId($index)"
            [attr.aria-selected]="isItemSelected"
            [attr.data-active]="brain.activeIndex() === $index ? '' : null"
            (click)="brain.selectItem(item)"
            class="menu-item-button"
          >
            <org-list-item [forceClickable]="true" [isSelected]="isItemSelected" [label]="item.display">
              @if (getItemPreIcon(isItemSelected); as preIconName) {
                <org-list-item-icon pre [name]="preIconName" />
              }
            </org-list-item>
          </button>
        }
        @if (brain.hasSelection() && brain.selectionMode() === 'multiple') {
          <org-overlay-menu-divider />
          <button type="button" (click)="brain.clearAndClose()" class="menu-item-button">
            <org-list-item [forceClickable]="true" label="Clear" />
          </button>
        }
      </org-list>
    </org-scroll-area>
  </div>
</ng-template>
