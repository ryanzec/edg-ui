<ng-template #contentTemplate>
  <ng-content select="[pre]" />
  <span [class]="hideLabel() ? 'sr-only' : 'flex-1'">{{ label() }}</span>
  <ng-content select="[post]" />
  @if (isExternalHref()) {
    <org-list-item-icon class="external-href-icon" [name]="externalHrefIconName" />
  }
</ng-template>

<li role="presentation">
  @switch (asTag()) {
    @case ('a') {
      <!-- --
      this breakout is needed as even if the routerLink is undefined, it it still hi-jacks the href attribute so even
      it it is passed, it won't se set
      -->
      @if (brain.routerLink()) {
        <a
          [routerLink]="brain.routerLink()"
          [attr.aria-current]="brain.isRouterLinkActive() ? 'page' : null"
          class="list-item-content"
          (click)="onClick($event)"
        >
          <ng-container [ngTemplateOutlet]="contentTemplate" />
        </a>
      } @else {
        <a
          [attr.href]="href()"
          [target]="isExternalHref() ? '_blank' : '_self'"
          [attr.rel]="isExternalHref() ? 'noopener noreferrer' : null"
          class="list-item-content"
          (click)="onClick($event)"
        >
          <ng-container [ngTemplateOutlet]="contentTemplate" />
        </a>
      }
    }
    @case ('button') {
      <!--
      because the default disabled attribute can have issues with CDKs overlay functionality, we only set the
      aria disabled property and handle the disabled state in the click handler itself
      -->
      <button type="button" class="list-item-content" (click)="onClick($event)">
        <ng-container [ngTemplateOutlet]="contentTemplate" />
      </button>
    }
    @default {
      @if (brain.hasClickObserver()) {
        <button type="button" class="list-item-content" (click)="onClick($event)">
          <ng-container [ngTemplateOutlet]="contentTemplate" />
        </button>
      } @else {
        <div class="list-item-content">
          <ng-container [ngTemplateOutlet]="contentTemplate" />
        </div>
      }
    }
  }
</li>
