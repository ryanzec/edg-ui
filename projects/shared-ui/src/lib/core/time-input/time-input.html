<org-input
  #inputComponent
  [variant]="variant()"
  [placeholder]="placeholder()"
  [value]="formattedValue()"
  [disabled]="isDisabled()"
  [readonly]="readonly()"
  [name]="name()"
  [ariaLabel]="brain.ariaLabel()"
  type="text"
  (keydown)="onKeyDown($event)"
  (focused)="onFocus()"
  (blurred)="onBlur()"
  (click)="onClick()"
/>
