<div [class]="'combobox-container ' + containerClass()">
  <div cdkOverlayOrigin #trigger="cdkOverlayOrigin">
    <org-input
      #inputComponent
      [placeholder]="placeholder()"
      [value]="brain.currentInputValue()"
      [disabled]="brain.isDisabled()"
      [inlineItems]="inlineItems()"
      postIcon="chevron-down"
      (valueChange)="inputValueChange($event)"
      (focused)="inputFocus()"
      (blurred)="inputBlur()"
      (inlineItemRemoved)="inlineItemRemove($event)"
      (keydown)="keyDown($event)"
      (click)="inputClick()"
      [name]="name()"
      inputClass="min-w-0"
      [inputRole]="brain.inputRole"
      [ariaExpanded]="brain.ariaExpanded()"
      [ariaHasPopup]="brain.ariaHasPopup"
      [ariaAutoComplete]="brain.ariaAutoComplete"
      [ariaActiveDescendant]="brain.focusedOptionId()"
      [ariaControls]="brain.listboxId()"
    />
  </div>

  <ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="trigger"
    [cdkConnectedOverlayOpen]="isOpened()"
    [cdkConnectedOverlayPositions]="overlayPositions"
    [cdkConnectedOverlayHasBackdrop]="false"
    [cdkConnectedOverlayPanelClass]="'org-combobox-overlay'"
    [cdkConnectedOverlayWidth]="overlayWidth()"
    [cdkConnectedOverlayMinWidth]="overlayMinWidth()"
    [cdkConnectedOverlayLockPosition]="false"
  >
    <org-combobox-options />
  </ng-template>
</div>
