<div cdkOverlayOrigin #trigger="cdkOverlayOrigin" class="org-date-picker-input-anchor">
  <org-input
    #inputComponent
    [value]="displayValue()"
    [placeholder]="placeholder()"
    [autoFocus]="autoFocus()"
    [disabled]="isDisabled()"
    [readonly]="true"
    preIcon="calendar"
    [postIcon]="allowTriggerClear() ? null : 'chevron-down'"
    [class.is-focus]="isOverlayOpen()"
    (postIconClicked)="onPostIconClick()"
    (click)="onInputClick()"
    (keydown)="onInputKeyDown($event)"
    (focused)="onInputFocused()"
    (blurred)="onInputBlurred()"
    [name]="name()"
  >
    @if (allowTriggerClear()) {
      <ng-template #post>
        @if (showTriggerClearButton()) {
          <org-button
            variant="text"
            color="neutral"
            size="sm"
            [iconOnly]="true"
            preIcon="x"
            label="Clear date"
            ariaLabel="Clear date"
            (click)="onTriggerClearClick($event)"
          />
        }
        <button
          type="button"
          class="trigger-chevron"
          (click)="onTriggerChevronClick($event)"
          [disabled]="isDisabled()"
          aria-label="Toggle calendar"
        >
          <org-icon name="chevron-down" />
        </button>
      </ng-template>
    }
  </org-input>
</div>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="isOverlayOpen()"
  [cdkConnectedOverlayPositions]="overlayPositions"
  [cdkConnectedOverlayHasBackdrop]="true"
  [cdkConnectedOverlayBackdropClass]="'cdk-overlay-transparent-backdrop'"
  [cdkConnectedOverlayPanelClass]="'org-date-picker-input-overlay'"
  (backdropClick)="onBackdropClick()"
  (attach)="onOverlayAttach()"
  (detach)="onOverlayDetach()"
>
  <div orgDatePickerInputDialogBrain class="org-date-picker-input-popover" [attr.data-state]="isOverlayOpen() ? 'open' : 'closed'">
    <org-calendar
      #calendarComponent
      [defaultDisplayDate]="defaultDisplayDate()"
      [startYear]="startYear()"
      [endYear]="endYear()"
      [selectedStartDate]="inProgressStartDate()"
      [selectedEndDate]="inProgressEndDate()"
      [allowRangeSelection]="allowRangeSelection()"
      [allowPartialRangeSelection]="allowPartialRangeSelection()"
      [partialRangeSelectionType]="inProgressPartialRangeSelectionType()"
      [disableBefore]="disableBefore()"
      [disableAfter]="disableAfter()"
      [allowedDateRange]="allowedDateRange()"
      [enableDeselection]="false"
      (dateSelected)="onDateSelected($event)"
      (partialRangeSelectionTypeChange)="onPartialRangeSelectionTypeChange($event)"
    >
      @if (allowClear() || isManualCommitMode()) {
        <org-calendar-footer>
          <div class="footer-actions">
            <div class="footer-actions-left">
              @if (allowClear()) {
                <org-button
                  variant="ghost"
                  color="neutral"
                  size="sm"
                  label="Clear"
                  [disabled]="isClearDisabled()"
                  (clicked)="onClearClick()"
                />
              }
            </div>
            <div class="footer-actions-right">
              @if (isManualCommitMode()) {
                <org-button
                  variant="ghost"
                  color="neutral"
                  size="sm"
                  label="Cancel"
                  (clicked)="onCancelClick()"
                />
                <org-button
                  variant="filled"
                  color="primary"
                  size="sm"
                  label="Apply"
                  [disabled]="!canApply()"
                  (clicked)="onApplyClick()"
                />
              }
            </div>
          </div>
        </org-calendar-footer>
      }
    </org-calendar>
  </div>
</ng-template>
