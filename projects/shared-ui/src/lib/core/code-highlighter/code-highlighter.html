@if (brain.variant() === 'block') {
  <div class="code-highlighter-copy-wrapper">
    @if (brain.canCopy()) {
      <button
        [type]="brain.copyButtonType"
        class="code-highlighter-copy-btn"
        (click)="brain.copy()"
        [attr.aria-label]="brain.copyAriaLabel()"
      >
        <org-icon name="copy" />
      </button>
    }
  </div>
  <div class="code-highlighter-body">
    <org-scroll-area direction="both" [onlyShowOnHover]="true" [scrollClass]="scrollClass()" spacingClass="p-2">
      <pre
        class="code-highlighter-pre"
        [style]="hasEllipsis() ? { '--code-highlighter-ellipsis-lines': ellipsisAt() } : null"
      >@if (brain.highlightedHtml(); as html) {<code [attr.data-language]="brain.language()" [innerHTML]="html"></code>} @else {<code [attr.data-language]="brain.language()">{{ brain.text() }}</code>}</pre>
    </org-scroll-area>
  </div>
} @else if (brain.variant() === 'inline') {
  @if (brain.highlightedHtml(); as html) {
    <code class="code-highlighter-inline" [attr.data-language]="brain.language()" [innerHTML]="html"></code>
  } @else {
    <code class="code-highlighter-inline" [attr.data-language]="brain.language()">{{ brain.text() }}</code>
  }
}
