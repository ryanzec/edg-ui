<ng-template #avatarContent>
  <ng-content />
</ng-template>

@if (avatarBrainDirective.isClickable()) {
  <button orgButtonBrain type="button" [ariaLabel]="label()" (clicked)="avatarBrainDirective.click()">
    <ng-container [ngTemplateOutlet]="avatarContent" />
  </button>
} @else {
  <div>
    <ng-container [ngTemplateOutlet]="avatarContent" />
  </div>
}
