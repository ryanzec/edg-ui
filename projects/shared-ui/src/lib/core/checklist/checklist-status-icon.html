@switch (status()) {
  @case ('not-started') {
    <org-icon name="circle" size="sm" />
  }
  @case ('in-progress') {
    <org-loading-spinner size="sm" iconColor="inherit" />
  }
  @case ('valid') {
    <org-icon name="check" size="sm" />
  }
  @case ('invalid') {
    <org-icon name="x" size="sm" />
  }
}
