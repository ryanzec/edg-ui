@if (hasNestedItems()) {
  <button
    type="button"
    class="checklist-item-button"
    (click)="brain.toggle()"
    [attr.aria-expanded]="brain.isExpanded()"
  >
    <org-checklist-status-icon [status]="item().status" />

    <span class="label">
      {{ item().label }}
      @if (nestedItemCount() > 0) {
        <span>({{ nestedItemCount() }})</span>
      }
    </span>

    <org-icon [name]="brain.isExpanded() ? 'chevron-down' : 'chevron-right'" size="sm" class="chevron" />
  </button>
} @else {
  <div class="checklist-item-row">
    <org-checklist-status-icon [status]="item().status" />

    <span class="label">{{ item().label }}</span>
  </div>
}

@if (hasNestedItems() && brain.isExpanded()) {
  <div class="nested-items" role="list">
    @for (nestedItem of item().items; track nestedItem.id) {
      <div class="nested-item" role="listitem">
        <div class="nested-item-row">
          <org-checklist-status-icon [status]="nestedItem.status" />

          <span class="label">{{ nestedItem.label }}</span>
        </div>
      </div>
    }
  </div>
}
