@if (hasNestedItems()) {
  <button type="button" class="row" data-clickable="1" (click)="brain.toggle()" [attr.aria-expanded]="brain.isExpanded()">
    <org-checklist-status-icon [status]="item().status" />

    <span class="label">{{ item().label }}</span>

    @if (item().count) {
      <span class="count">{{ item().count }}</span>
    }

    @if (item().meta) {
      <span class="meta">{{ item().meta }}</span>
    }

    <span class="chevron">
      <org-icon name="chevron-right" size="sm" />
    </span>
  </button>
} @else {
  <div class="row">
    <org-checklist-status-icon [status]="item().status" />

    <span class="label">{{ item().label }}</span>

    @if (item().meta) {
      <span class="meta">{{ item().meta }}</span>
    }
  </div>
}

@if (hasNestedItems()) {
  <ul class="children" role="list">
    @for (nestedItem of item().items; track nestedItem.id) {
      <li class="nested-item" [attr.data-status]="nestedItem.status" role="listitem">
        <div class="row">
          <org-checklist-status-icon [status]="nestedItem.status" />

          <span class="label">{{ nestedItem.label }}</span>

          @if (nestedItem.meta) {
            <span class="meta">{{ nestedItem.meta }}</span>
          }
        </div>
      </li>
    }
  </ul>
}
