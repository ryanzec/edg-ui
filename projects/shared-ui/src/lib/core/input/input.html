@for (item of inlineItems(); track item.id) {
  <org-tag
    color="primary"
    [removable]="item.removable && brainRef.canModifyContent()"
    (removed)="onInlineItemRemove(item)"
  >
    {{ item.label }}
  </org-tag>
}
@if (hasPreIcon()) {
  @if (isPreIconClickable()) {
    <button
      type="button"
      class="input-icon-btn"
      (click)="brainRef.handlePreIconRequest()"
      [disabled]="isDisabled()"
      [attr.aria-label]="preIconAriaLabel()"
    >
      <org-icon [name]="preIcon()!" />
    </button>
  } @else {
    <span class="input-icon-btn" aria-hidden="true">
      <org-icon [name]="preIcon()!" />
    </span>
  }
}
<input
  orgInputBrain
  #brainRef="orgInputBrain"
  class="native-input"
  [(value)]="value"
  [type]="type()"
  [name]="name()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [autoFocus]="autoFocus()"
  [selectAllOnFocus]="selectAllOnFocus()"
  [showPasswordToggle]="showPasswordToggle()"
  [autocomplete]="autocomplete()"
  [blockPasswordManager]="blockPasswordManager()"
  [ariaExpanded]="ariaExpanded()"
  [ariaHasPopup]="ariaHasPopup()"
  [ariaAutoComplete]="ariaAutoComplete()"
  [ariaActiveDescendant]="ariaActiveDescendant()"
  [ariaControls]="ariaControls()"
  [role]="inputRole()"
  [ariaLabel]="ariaLabel()"
  [placeholder]="placeholder()"
  (focused)="onBrainFocused()"
  (blurred)="onBrainBlurred()"
  (preIconRequested)="onBrainPreIconRequested()"
  (postIconRequested)="onBrainPostIconRequested()"
/>
@if (hasPostIcon()) {
  @if (isPostIconInteractive()) {
    <button
      type="button"
      class="input-icon-btn"
      (click)="brainRef.handlePostIconRequest()"
      [disabled]="isDisabled()"
      [attr.aria-label]="postIconAriaLabelText()"
    >
      <org-icon [name]="currentPostIcon()!" />
    </button>
  } @else {
    <span class="input-icon-btn" aria-hidden="true">
      <org-icon [name]="currentPostIcon()!" />
    </span>
  }
}
