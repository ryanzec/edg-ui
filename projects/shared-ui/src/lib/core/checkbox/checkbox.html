<label
  class="checkbox-label"
  (click)="onClick($event)"
  (keydown)="onKeyDown($event)"
  [attr.tabindex]="brain.tabIndex()"
  [attr.role]="brain.role"
  [attr.aria-checked]="brain.ariaChecked()"
  [attr.aria-disabled]="brain.ariaDisabled()"
  [attr.aria-describedby]="brain.ariaDescribedBy()"
  [attr.aria-invalid]="brain.ariaInvalid()"
>
  <input
    #inputRef
    type="checkbox"
    [name]="name()"
    [value]="value()"
    [checked]="brain.checked()"
    [disabled]="brain.disabled()"
    [indeterminate]="brain.indeterminate()"
    [attr.aria-hidden]="true"
    tabindex="-1"
    class="native-input"
  />
  <div class="checkbox-icon">
    <org-icon [name]="currentIcon()" [size]="size()" />
  </div>
  <div class="checkbox-body">
    <span class="checkbox-label-text" orgText [textSize]="textSize()">
      <ng-content />
    </span>
    @if (description()) {
      <span class="checkbox-description">{{ description() }}</span>
    }
  </div>
</label>
