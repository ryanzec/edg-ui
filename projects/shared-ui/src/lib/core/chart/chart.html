<div [class]="containerClasses()">
  @if (isLoading()) {
    <div class="state-container">
      <org-loading-spinner size="lg" />
    </div>
  }

  @if (isEmpty()) {
    <div class="state-container">
      <org-empty-indicator header="no chart data available" />
    </div>
  }

  @if (hasError()) {
    <div class="error-container" role="alert">
      <p class="error-message">{{ error() }}</p>
    </div>
  }

  @if (shouldShowChart()) {
    <div class="canvas-container">
      <canvas #canvasRef role="img" [attr.aria-label]="canvasAriaLabel()"></canvas>
    </div>
  }
</div>
