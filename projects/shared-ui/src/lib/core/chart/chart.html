<div [class]="containerClasses()">
  @if (brain.isLoading()) {
    <div class="state-container">
      <org-loading-spinner size="lg" />
    </div>
  }

  @if (brain.isEmpty()) {
    <div class="state-container">
      <org-empty-indicator header="no chart data available" />
    </div>
  }

  @if (brain.hasError()) {
    <div class="error-container" role="alert">
      <p class="error-message">{{ brain.error() }}</p>
    </div>
  }

  @if (brain.shouldShowChart()) {
    <div class="canvas-container">
      <canvas #canvasRef></canvas>
    </div>
  }
</div>
