<!-- logo / collapse toggle -->
<div class="main-section">
  <button
    type="button"
    class="logo-toggle"
    [attr.data-has-logo]="logo() ? '' : null"
    [attr.aria-label]="toggleAriaLabel()"
    [attr.aria-pressed]="collapsed() ? 'true' : 'false'"
    (click)="onCollapseToggleClick()"
  >
    @if (logo()) {
      <img [src]="logo()" alt="Logo" class="logo" />
    }
    <org-icon class="toggle-icon" [name]="toggleIconName()" />
  </button>

  <!-- navigation items -->
  <nav aria-label="Main navigation" class="nav">
    <org-list>
      @for (item of navigationItems(); track item.id) {
        @if (collapsed()) {
          <ng-template #navItemTooltip>
            <div class="tooltip-content">
              {{ item.label }}
            </div>
          </ng-template>
          <org-tooltip [templateRef]="navItemTooltip" xPosition="right" yPosition="center">
            <org-list-item
              asTag="a"
              [routerLink]="item.routePath"
              [label]="item.label"
              [hideLabel]="true"
              (clicked)="onNavigationItemClick(item)"
            >
              <org-list-item-icon pre [name]="item.icon" />
            </org-list-item>
          </org-tooltip>
        } @else {
          <org-list-item
            asTag="a"
            [routerLink]="item.routePath"
            [label]="item.label"
            (clicked)="onNavigationItemClick(item)"
          >
            <org-list-item-icon pre [name]="item.icon" />
          </org-list-item>
        }
      }
    </org-list>
  </nav>

  <!-- settings menu -->
  <div class="settings-section">
    <org-list>
      @if (settingsMenuItems().length > 0) {
        @if (collapsed()) {
          <ng-template #settingsTooltip>
            <div class="tooltip-content">Settings</div>
          </ng-template>
          <org-tooltip [templateRef]="settingsTooltip" xPosition="right" yPosition="center">
            <org-list-item
              [cdkMenuTriggerFor]="settingsMenu"
              [cdkMenuPosition]="menuPosition"
              asTag="button"
              label="Settings"
              [hideLabel]="true"
              [forceClickable]="true"
            >
              <org-list-item-icon pre name="cog" />
            </org-list-item>
          </org-tooltip>
        } @else {
          <org-list-item
            [cdkMenuTriggerFor]="settingsMenu"
            [cdkMenuPosition]="menuPosition"
            asTag="button"
            label="Settings"
            [forceClickable]="true"
          >
            <org-list-item-icon pre name="cog" />
          </org-list-item>
        }
      }
      @if (collapsed()) {
        <ng-template #logoutTooltip>
          <div class="tooltip-content">Logout</div>
        </ng-template>
        <org-tooltip [templateRef]="logoutTooltip" xPosition="right" yPosition="center">
          <org-list-item asTag="button" label="Logout" [hideLabel]="true" (clicked)="onLogoutClick()">
            <org-list-item-icon pre name="log-out" />
          </org-list-item>
        </org-tooltip>
      } @else {
        <org-list-item asTag="button" label="Logout" (clicked)="onLogoutClick()">
          <org-list-item-icon pre name="log-out" />
        </org-list-item>
      }
    </org-list>
    <ng-template #settingsMenu>
      <org-overlay-menu [items]="settingsMenuItems()" (itemClicked)="onSettingsMenuItemClick($event)" />
    </ng-template>
  </div>
</div>

<!-- user section -->
@if (userName()) {
  <div class="user-section">
    @if (collapsed()) {
      <ng-template #userTooltip>
        <div class="tooltip-content">
          {{ userName() }}
        </div>
      </ng-template>
      <org-tooltip [templateRef]="userTooltip" xPosition="right" yPosition="center">
        <org-avatar [label]="userName()" />
      </org-tooltip>
    } @else {
      <org-avatar [label]="userName()" [showLabel]="true" />
    }
  </div>
}
