<ng-template #contentTemplate>
  <ng-content />
</ng-template>

@switch (brain.headingLevel()) {
  @case (1) {
    <h1 class="heading">
      <ng-container [ngTemplateOutlet]="contentTemplate" />
    </h1>
  }
  @case (2) {
    <h2 class="heading">
      <ng-container [ngTemplateOutlet]="contentTemplate" />
    </h2>
  }
  @case (3) {
    <h3 class="heading">
      <ng-container [ngTemplateOutlet]="contentTemplate" />
    </h3>
  }
  @case (4) {
    <h4 class="heading">
      <ng-container [ngTemplateOutlet]="contentTemplate" />
    </h4>
  }
  @case (5) {
    <h5 class="heading">
      <ng-container [ngTemplateOutlet]="contentTemplate" />
    </h5>
  }
  @case (6) {
    <h6 class="heading">
      <ng-container [ngTemplateOutlet]="contentTemplate" />
    </h6>
  }
}
