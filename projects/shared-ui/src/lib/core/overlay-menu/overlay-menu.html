<div cdkMenu [attr.aria-label]="menuLabel()" class="menu-container">
  <org-list listRole="none" borderVariant="outer">
    @for (item of menuItems(); track item.id) {
      @if (item.type === 'divider') {
        <org-overlay-menu-divider />
      } @else {
        <button type="button" cdkMenuItem (cdkMenuItemTriggered)="onMenuItemClick(item)" class="menu-item-button">
          <org-list-item [forceClickable]="true">
            @if (item.icon; as icon) {
              <org-list-item-icon [name]="icon" />
            }
            {{ item.label }}
          </org-list-item>
        </button>
      }
    }
  </org-list>
</div>
