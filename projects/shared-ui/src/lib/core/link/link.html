@if (brain.disabled()) {
  <span
    class="link"
    [attr.aria-label]="brain.ariaLabel() ?? null"
    [attr.data-disabled]="'1'"
    [attr.role]="brain.effectiveRole()"
    [attr.tabindex]="brain.effectiveTabindex()"
  >
    <ng-container [ngTemplateOutlet]="content" />
  </span>
} @else {
  <a
    class="link"
    [attr.href]="brain.effectiveHref()"
    [attr.target]="brain.effectiveTarget()"
    [attr.rel]="brain.effectiveRel()"
    [attr.download]="brain.effectiveDownload()"
    [attr.hreflang]="brain.effectiveHreflang()"
    [attr.referrerpolicy]="brain.effectiveReferrerPolicy()"
    [attr.aria-label]="brain.ariaLabel() ?? null"
    [attr.role]="brain.effectiveRole()"
    [attr.tabindex]="brain.effectiveTabindex()"
    (click)="brain.handleClick($event)"
    (keydown)="brain.handleKeydown($event)"
  >
    <ng-container [ngTemplateOutlet]="content" />
  </a>
}

<ng-template #content>
  @if (preTemplate(); as preTemplate) {
    <ng-container [ngTemplateOutlet]="preTemplate" />
  }
  <ng-content />
  @if (postTemplate(); as postTemplate) {
    <ng-container [ngTemplateOutlet]="postTemplate" />
  }
  @if (showAffordanceIcon()) {
    <org-icon class="link-icon" [name]="affordanceIcon()!" data-position="post" />
  }
</ng-template>
