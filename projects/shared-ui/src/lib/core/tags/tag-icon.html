@if (brain.hasIcon() && !isSuppressedByParent()) {
  <button
    [type]="brain.buttonType"
    class="tag-icon-btn"
    [attr.data-clickable]="brain.isClickable() ? '' : null"
    [disabled]="!brain.isClickable()"
    [attr.aria-label]="brain.resolvedAriaLabel()"
  >
    <org-icon [name]="brain.resolvedIconName()!" [size]="size()" />
  </button>
}
