<textarea
  orgTextareaBrain
  #brainRef="orgTextareaBrain"
  class="native"
  [(value)]="value"
  [name]="name()"
  [disabled]="disabled()"
  [readonly]="effectiveReadonly()"
  [autoFocus]="autoFocus()"
  [selectAllOnFocus]="selectAllOnFocus()"
  [inverseEnter]="inverseEnter()"
  [placeholder]="placeholder()"
  (focused)="onBrainFocused()"
  (blurred)="onBrainBlurred()"
  (submitKeyPressed)="onBrainSubmitKeyPressed()"
></textarea>

<ng-content select="org-textarea-toolbar" />
