<div class="textarea-content">
  @for (item of inlineItems(); track item.id) {
    <org-tag color="primary" variant="weak">
      {{ item.label }}
      @if (!!(item.removable && !isDisabled() && !readonly())) {
        <org-tag-icon [removable]="true" (removed)="onInlineItemRemove(item)" />
      }
    </org-tag>
  }
  @if (hasPreIcon()) {
    <button
      type="button"
      class="textarea-icon-btn textarea-pre-icon-btn"
      (click)="onPreIconClick()"
      [disabled]="isDisabled() || readonly()"
      [attr.aria-label]="preIconAriaLabel()"
    >
      <org-icon [name]="preIcon()!" />
    </button>
  }
  <textarea
    #textareaRef
    class="native-textarea"
    [value]="value()"
    [placeholder]="placeholder()"
    [disabled]="isDisabled()"
    [readonly]="readonly()"
    [rows]="effectiveRows()"
    [attr.autofocus]="autoFocus() || null"
    (input)="onInputChange($event)"
    (blur)="onBlur()"
    (keydown)="onKeyDown($event)"
    [name]="name()"
    [attr.id]="name()"
    [attr.aria-describedby]="ariaDescribedBy()"
    [attr.aria-invalid]="ariaInvalid()"
  ></textarea>
  @if (hasPostIcon()) {
    <button
      type="button"
      class="textarea-icon-btn textarea-post-icon-btn"
      (click)="onPostIconClick()"
      [disabled]="isDisabled() || readonly()"
      [attr.aria-label]="postIconAriaLabel()"
    >
      <org-icon [name]="postIcon()!" />
    </button>
  }
</div>
<ng-content select="org-textarea-toolbar" />
