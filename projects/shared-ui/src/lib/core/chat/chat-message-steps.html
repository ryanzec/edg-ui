@if (hasSteps()) {
  <org-button
    color="neutral"
    variant="text"
    size="sm"
    [excludeSpacing]="true"
    [ariaExpanded]="isExpanded()"
    (clicked)="toggleExpanded()"
    class="self-start"
  >
    {{ isExpanded() ? 'Hide' : 'Show' }} Steps ({{ steps().length }})
    <org-button-icon [name]="isExpanded() ? 'chevron-up' : 'chevron-down'" />
  </org-button>

  @if (isExpanded()) {
    <org-checklist [items]="steps()" />
  }
}
