@if (hasAttachments()) {
  <div class="composer-attachments">
    @for (attachment of attachments(); track attachment.id) {
      <org-tag
        color="primary"
        [removable]="(attachment.removable ?? true) && !disabled() && !streaming()"
        (removed)="onAttachmentRemove(attachment)"
      >
        {{ attachment.label }}
      </org-tag>
    }
  </div>
}

<div class="composer-pill">
  <org-textarea
    class="composer-textarea"
    variant="borderless"
    [name]="name()"
    [placeholder]="placeholder()"
    [(value)]="value"
    [disabled]="isTextareaDisabled()"
    [readonly]="textareaReadonly()"
    [lines]="[1, 6]"
    (submitKeyPressed)="onSubmitKeyPressed()"
  />

  <div class="composer-action-bar">
    <div class="composer-actions-start">
      @if (showAttach()) {
        <button
          type="button"
          class="composer-icon-button"
          [disabled]="isAttachDisabled()"
          [attr.aria-label]="attachAriaLabel()"
          (click)="onAttach()"
        >
          <org-icon name="plus" size="xs" />
        </button>
      }
      <ng-content />
    </div>

    <div class="composer-actions-end">
      @if (streaming()) {
        <span class="composer-streaming-label">{{ streamingLabel() }}</span>
        <button
          type="button"
          class="composer-stop-button"
          [attr.aria-label]="stopAriaLabel()"
          (click)="onStop()"
        >
          <org-icon name="square" size="xs" />
        </button>
      } @else {
        @if (showHint()) {
          <span class="composer-hint">{{ hintLabel() }}</span>
        }
        <button
          type="button"
          class="composer-icon-button composer-send-button"
          [disabled]="isSendDisabled()"
          [attr.aria-label]="sendAriaLabel()"
          (click)="onSend()"
        >
          <org-icon name="arrow-up" size="xs" />
        </button>
      }
    </div>
  </div>
</div>
