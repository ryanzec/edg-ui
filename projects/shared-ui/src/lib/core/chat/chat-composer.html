@if (hasAttachments()) {
  <div class="attachments">
    @for (attachment of attachments(); track attachment.id) {
      <org-tag
        color="primary"
        [removable]="(attachment.removable ?? true) && !disabled() && !streaming()"
        (removed)="onAttachmentRemove(attachment)"
      >
        {{ attachment.label }}
      </org-tag>
    }
  </div>
}

<org-textarea
  class="composer-textarea"
  [name]="name()"
  [placeholder]="placeholder()"
  [(value)]="value"
  [disabled]="isTextareaDisabled()"
  [readonly]="textareaReadonly()"
  [minLines]="1"
  [maxLines]="6"
  (submitKeyPressed)="onSubmitKeyPressed()"
>
  <org-textarea-toolbar
    [showSendButton]="showSendButton()"
    [showHint]="showToolbarHint()"
    [hintLabel]="hintLabel()"
    [hintKey]="hintKey()"
    [sendDisabled]="isSendDisabled()"
    [sendAriaLabel]="sendAriaLabel()"
    (sendClicked)="onSend()"
  >
    @if (showAttach()) {
      <org-textarea-toolbar-item>
        <org-button
          variant="text"
          size="sm"
          [iconOnly]="true"
          preIcon="plus"
          [label]="attachAriaLabel()"
          [ariaLabel]="attachAriaLabel()"
          [disabled]="isAttachDisabled()"
          (clicked)="onAttach()"
        />
      </org-textarea-toolbar-item>
    }
    <ng-content />

    @if (streaming()) {
      <span toolbar-right class="streaming-label">{{ streamingLabel() }}</span>
    }
    @if (streaming()) {
      <org-button
        toolbar-right
        variant="filled"
        color="danger"
        size="sm"
        [iconOnly]="true"
        preIcon="square"
        [label]="stopAriaLabel()"
        [ariaLabel]="stopAriaLabel()"
        (clicked)="onStop()"
      />
    }
  </org-textarea-toolbar>
</org-textarea>
