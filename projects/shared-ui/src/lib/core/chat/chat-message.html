<ng-template #bodyTemplate>
  <div class="message-body">
    <ng-content select="[body]" />
  </div>
</ng-template>

@if (isSystem()) {
  @if (hasSystemIcon()) {
    <org-icon [name]="systemIcon()!" size="xs" />
  }
  <ng-container [ngTemplateOutlet]="bodyTemplate" />
} @else {
  <org-avatar
    size="sm"
    [label]="authorName()"
    [imgSrc]="avatarImgSrc()"
    [imgEmail]="avatarImgEmail()"
    [shape]="avatarShape()"
    [attr.data-hidden]="isLeadOfRun() ? null : '1'"
  />
  <div class="message-column">
    @if (isLeadOfRun()) {
      <div class="message-author">
        <span class="author-name">{{ authorName() }}</span>
        @if (hasPostMeta()) {
          <span class="author-post" [class.author-post-meta]="postIsMeta()" [class.author-post-time]="!postIsMeta()">{{
            postMeta()
          }}</span>
        }
        @if (hasEdited()) {
          <span class="author-edited">(edited)</span>
        }
      </div>
    }

    <ng-content select="[quote]" />

    @if (useSurface()) {
      <org-box class="message-body-wrap" [color]="boxColor()" [border]="boxBorder()" padding="sm" background="colored">
        <ng-container [ngTemplateOutlet]="bodyTemplate" />
      </org-box>
    } @else {
      <ng-container [ngTemplateOutlet]="bodyTemplate" />
    }

    <ng-content />
  </div>
  <div class="message-hover-actions">
    <ng-content select="[hoverActions]" />
  </div>
}
