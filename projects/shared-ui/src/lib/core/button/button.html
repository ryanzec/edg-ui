<button
  orgButtonBrain
  [type]="type()"
  [class]="buttonClass()"
  [disabled]="disabled()"
  [loading]="loading()"
  [iconOnly]="iconOnly()"
  [active]="isActive()"
  [ariaLabel]="ariaLabel()"
  [ariaExpanded]="ariaExpanded()"
  [ariaPressed]="ariaPressed()"
  (clicked)="onBrainClicked()"
>
  @if (loading()) {
    <org-loading-spinner [size]="size()" />
  } @else {
    @if (preTemplate()) {
      <ng-container [ngTemplateOutlet]="preTemplate()!" />
    } @else if (showPreIcon()) {
      <org-icon class="pre-icon" [name]="preIcon()!" [size]="iconSize()" />
    }
  }
  @if (iconOnly() === false) {
    <span>{{ label() }}</span>
  }
  @if (!loading()) {
    @if (postTemplate()) {
      <ng-container [ngTemplateOutlet]="postTemplate()!" />
    } @else if (showPostIcon()) {
      <org-icon class="post-icon" [name]="postIcon()!" [size]="iconSize()" />
    }
  }
</button>
