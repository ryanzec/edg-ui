<button
  orgButtonBrain
  [type]="type()"
  [class]="buttonClass()"
  [disabled]="disabled()"
  [loading]="loading()"
  [iconOnly]="iconOnly()"
  [active]="isActive()"
  [ariaLabel]="ariaLabel()"
  [ariaExpanded]="ariaExpanded()"
  [ariaPressed]="ariaPressed()"
  (clicked)="onBrainClicked()"
>
  @if (showStandaloneSpinner()) {
    <org-loading-spinner [size]="size()" />
  }

  <ng-content />
</button>
