<ng-template #content>
  <span class="org-label-text">{{ labelBrainDirective.text() }}</span>

  @if (labelBrainDirective.isLoading()) {
    <org-loading-spinner size="sm" />
  }

  <span class="org-label-post">
    <ng-content select="[post]" />
  </span>
</ng-template>

@if (labelBrainDirective.asLabel()) {
  <label
    class="org-label"
    [attr.for]="labelBrainDirective.htmlFor()"
    [attr.data-required]="labelBrainDirective.isRequired() ? '1' : null"
    [attr.data-loading]="labelBrainDirective.isLoading() ? '1' : null"
  >
    <ng-container [ngTemplateOutlet]="content" />
  </label>
} @else {
  <div
    class="org-label"
    [attr.data-required]="labelBrainDirective.isRequired() ? '1' : null"
    [attr.data-loading]="labelBrainDirective.isLoading() ? '1' : null"
  >
    <ng-container [ngTemplateOutlet]="content" />
  </div>
}
