<ng-template #labelTemplate>
  {{ labelBrainDirective.text() }}

  @if (labelBrainDirective.isRequired()) {
    <span class="required-marker" [attr.aria-hidden]="labelBrainDirective.requiredMarkerAriaHidden">*</span>
    <span class="sr-only">{{ labelBrainDirective.requiredAccessibilityText }}</span>
  }

  @if (labelBrainDirective.isLoading()) {
    <org-loading-spinner />
  }

  <ng-content />
</ng-template>

@if (labelBrainDirective.asLabel()) {
  <label [for]="labelBrainDirective.htmlFor()">
    <ng-container [ngTemplateOutlet]="labelTemplate" />
  </label>
} @else {
  <div>
    <ng-container [ngTemplateOutlet]="labelTemplate" />
  </div>
}
