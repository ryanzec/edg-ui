@if (showCloseIcon()) {
  <org-button
    [iconOnly]="true"
    variant="text"
    color="neutral"
    [excludeSpacing]="true"
    [disabled]="!closeIconEnabled()"
    (clicked)="close()"
    class="close-button"
    [class.close-button--disabled]="!closeIconEnabled()"
    ariaLabel="Close"
    [attr.aria-disabled]="!closeIconEnabled()"
  >
    <org-button-icon name="x" />
  </org-button>
}
