@if (calendarComponent.showPartialRangeSelectionType()) {
  <div class="container">
    <org-button-toggle
      [items]="items"
      [value]="calendarComponent.partialRangeSelectionType()"
      [disabled]="calendarComponent.disabled()"
      buttonSize="sm"
      (changed)="calendarComponent.onPartialRangeSelectionTypeChange($event)"
    />
  </div>
}
