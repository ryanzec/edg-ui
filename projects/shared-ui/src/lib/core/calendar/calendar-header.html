<div class="header">
  <org-button
    [iconOnly]="true"
    variant="ghost"
    size="sm"
    [excludeSpacing]="true"
    [disabled]="calendarComponent.disabled()"
    (clicked)="onPreviousClick()"
    label="Previous month"
    ariaLabel="Previous month"
    preIcon="chevron-left"
  />

  <div class="cluster">
    <org-drop-down-selector
      label="Month"
      size="sm"
      [items]="monthItems()"
      [selectedItems]="selectedMonthItems()"
      [disabled]="calendarComponent.disabled()"
      (selectedItemsChange)="onMonthChanged($event)"
    />

    <org-drop-down-selector
      label="Year"
      size="sm"
      [items]="yearItems()"
      [selectedItems]="selectedYearItems()"
      [disabled]="calendarComponent.disabled()"
      (selectedItemsChange)="onYearChanged($event)"
    />
  </div>

  <org-button
    [iconOnly]="true"
    variant="ghost"
    size="sm"
    [excludeSpacing]="true"
    [disabled]="calendarComponent.disabled()"
    (clicked)="onNextClick()"
    label="Next month"
    ariaLabel="Next month"
    preIcon="chevron-right"
  />
</div>
