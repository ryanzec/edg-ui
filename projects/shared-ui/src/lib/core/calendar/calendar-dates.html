<div class="weekdays" aria-hidden="true">
  @for (label of calendarComponent.dayLabels; track $index) {
    <span class="weekday">{{ label.short }}</span>
  }
</div>

<div role="grid" class="grid" (mouseleave)="calendarComponent.onMouseLeave()">
  <div role="row" class="visually-hidden-row">
    @for (label of calendarComponent.dayLabels; track $index) {
      <div role="columnheader">{{ label.label }}</div>
    }
  </div>

  @for (week of calendarComponent.calendarDates(); track $index) {
    <div role="row" class="week-row">
      @for (dateData of week; track dateData.date.toISO()) {
        <button
          type="button"
          role="gridcell"
          class="day"
          tabindex="-1"
          (click)="calendarComponent.onDateClick(dateData)"
          (mouseenter)="calendarComponent.onDateHover(dateData)"
          [attr.aria-label]="dateData.date.toFormat('MMMM d, yyyy')"
          [attr.aria-selected]="dateData.isSelected"
          [attr.aria-disabled]="dateData.isDisabled ? 'true' : null"
          [attr.aria-current]="dateData.isToday ? 'date' : null"
          [attr.data-today]="dateData.isToday ? '' : null"
          [attr.data-selected]="dateData.isSelected ? '' : null"
          [attr.data-outside-month]="!dateData.isCurrentMonth ? '' : null"
          [attr.data-focused]="dateData.isFocused ? '' : null"
          [attr.data-range-pos]="dateData.rangePos"
        >
          <span class="day-band"></span>
          <span class="day-chip"></span>
          <span class="day-num">{{ getDay(dateData) }}</span>
        </button>
      }
    </div>
  }
</div>
