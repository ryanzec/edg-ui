<div
  #calendarContainerRef
  [class]="'container ' + containerClass()"
  (keydown)="onKeyDown($event)"
  [attr.tabindex]="disabled() ? -1 : 0"
  aria-label="Calendar"
>
  <span class="sr-only" aria-live="polite" aria-atomic="true">{{ _liveAnnouncement() }}</span>

  <org-calendar-header />

  <org-calendar-partial-range-selector />

  <org-calendar-dates />

  <ng-content select="org-calendar-footer" />
</div>
