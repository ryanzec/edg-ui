<button
  type="button"
  class="file-upload-zone"
  orgFileUploadBrain
  #brain="orgFileUploadBrain"
  [fileTypes]="fileTypes()"
  [ariaLabel]="ariaLabel()"
  (fileSelected)="onBrainFileSelected($event)"
>
  <input
    type="file"
    #fileInputRef
    class="native-input"
    [accept]="brain.fileTypesAsString()"
    (change)="brain.nativeFileSelected($event)"
    data-testid="file-upload-input"
  />

  @if (brain.fileName()) {
    <div class="file-message">
      <org-icon name="check" size="lg" class="icon-safe"></org-icon>
      <span class="primary-text">{{ brain.fileName() }} ready!</span>
      <small class="secondary-text">Click or drag another file to replace.</small>
    </div>
  } @else {
    <div class="file-message">
      <org-icon name="upload" size="lg" class="icon-info"></org-icon>
      <span class="primary-text">Drag &amp; Drop your file here</span>
      <small class="secondary-text">or <b class="click-text">click</b> to select one</small>
    </div>
  }

  @if (brain.error()) {
    <div
      class="file-upload-error"
      [id]="brain.errorRegionId"
      [attr.role]="brain.errorRole"
      [attr.aria-live]="brain.errorAriaLive"
    >
      <org-icon name="x" class="icon-danger"></org-icon>
      <span>{{ brain.error() }}</span>
    </div>
  }
</button>
