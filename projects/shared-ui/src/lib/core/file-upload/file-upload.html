<label class="org-file-upload">
  <input
    type="file"
    class="org-file-upload-input"
    [accept]="brain.fileTypesAsString()"
    [disabled]="brain.isDisabled()"
    (change)="onNativeChange($event)"
    data-testid="file-upload-input"
  />

  <span class="org-file-upload-empty">
    <org-icon name="upload" size="4xl" class="org-file-upload-empty-icon" />
    <span class="org-file-upload-prompt">
      {{ prompt() }}
      @if (browseLabel()) {
        <span class="org-file-upload-cta">{{ browseLabel() }}</span>
      }
    </span>
    @if (hint() || brain.error()) {
      <span
        class="org-file-upload-hint"
        [id]="brain.errorRegionId"
        [attr.role]="brain.error() ? brain.errorRole : null"
        [attr.aria-live]="brain.error() ? brain.errorAriaLive : null"
      >
        {{ brain.error() ?? hint() }}
      </span>
    }
  </span>

  <span class="org-file-upload-file">
    <org-icon name="paperclip" size="2xl" class="org-file-upload-file-icon" />
    <span class="org-file-upload-file-text">
      <span class="org-file-upload-file-name">{{ brain.fileName() }}</span>
      @if (resolvedFileMeta()) {
        <span class="org-file-upload-file-meta">{{ resolvedFileMeta() }}</span>
      }
    </span>
    <button
      type="button"
      class="org-file-upload-remove"
      [attr.aria-label]="removeAriaLabel()"
      [disabled]="brain.isDisabled()"
      (click)="onRemoveClick($event)"
      data-testid="file-upload-remove"
    >
      <org-icon name="x" size="base" />
    </button>
  </span>
</label>
