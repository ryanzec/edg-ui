@if (brain.scrollable()) {
  <org-button
    color="neutral"
    variant="ghost"
    [iconOnly]="true"
    [disabled]="!brain.canScrollLeft()"
    (clicked)="brain.scrollLeft()"
    buttonClass="shrink-0 self-center"
    label="Scroll tabs left"
    ariaLabel="Scroll tabs left"
    preIcon="chevron-left"
  />
}

<!--
  eslint-disable-next-line @angular-eslint/template/interactive-supports-focus -- tablist is a composite widget;
  focus is managed by child role="tab" buttons per the ARIA tabs pattern (APG). keydown fires via event bubbling,
  not direct container focus.
-->
<div
  #tabsContainerRef
  [attr.role]="brain.tablistRole"
  class="tablist"
  (scroll)="brain.handleContainerScroll($event)"
  (scrollend)="brain.handleContainerScroll($event)"
  (keydown)="brain.handleKeyDown($event)"
>
  <ng-content />
</div>

@if (brain.scrollable()) {
  <org-button
    color="neutral"
    variant="ghost"
    [iconOnly]="true"
    [disabled]="!brain.canScrollRight()"
    (clicked)="brain.scrollRight()"
    buttonClass="shrink-0 self-center"
    label="Scroll tabs right"
    ariaLabel="Scroll tabs right"
    preIcon="chevron-right"
  />
}
