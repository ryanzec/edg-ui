<org-box layout="stack">
  <org-box-header title="Sign In" subtitle="Please enter your credentials to continue" />
  <org-box-content>
    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <org-form-fields>
        <org-form-field [validationMessage]="getFieldError('email') || ''">
          <org-label htmlFor="email" [text]="getFieldLabel('email')" />
          <org-input
            type="email"
            name="email"
            formControlName="email"
            placeholder="Enter your email"
            autocomplete="email"
            [autoFocus]="true"
            preIcon="mail"
          />
        </org-form-field>
        <org-form-field [validationMessage]="getFieldError('password') || ''">
          <org-label htmlFor="password" [text]="getFieldLabel('password')" />
          <org-input
            type="password"
            name="password"
            formControlName="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            preIcon="lock-keyhole"
            [showPasswordToggle]="true"
          />
        </org-form-field>
      </org-form-fields>
      <org-button-group orientation="vertical">
        <org-button color="primary" type="submit" buttonClass="w-full" label="Sign In" [loading]="isProcessing()" />
        <org-button color="primary" buttonClass="w-full" label="Reset Password" [disabled]="isProcessing()" />
        <org-button color="primary" buttonClass="w-full" label="Single Sign-On" [disabled]="isProcessing()" />
      </org-button-group>
    </form>
  </org-box-content>
</org-box>
