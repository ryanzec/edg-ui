@if (isInDialog) {
  <org-dialog [class]="dialogClass()" [hasRoundedCorners]="hasRoundedCorners()">
    <org-dialog-header title="Delete User" />
    <org-dialog-content>
      <p>Are you sure you want to delete {{ usersName() }}?</p>
    </org-dialog-content>
    <org-dialog-footer>
      <org-button color="neutral" label="Cancel" [disabled]="isProcessing()" (clicked)="onCancelClick()" />
      <org-button color="danger" label="Delete" [loading]="isProcessing()" (clicked)="onDeleteClick()" />
    </org-dialog-footer>
  </org-dialog>
}
