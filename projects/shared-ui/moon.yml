$schema: https://moonrepo.dev/schemas/project.json
tasks:
  type-check:
    command: $workspaceRoot/node_modules/.bin/ngc --project tsconfig.lib.prod.json
    inputs:
      - '**/*'
      - /tsconfig.json
      - /tsconfig.lib.json
    env:
      NODE_ENV: development
    options:
      runFromWorkspaceRoot: false
  test-unit:
    command: $workspaceRoot/node_modules/.bin/ng test --no-progress shared-ui
    inputs:
      - '**/*'
      - /tsconfig.json
      - /tsconfig.spec.json
    env:
      NODE_ENV: development
    options:
      runFromWorkspaceRoot: false
      cache: false
  test-unit-browser:
    command: $workspaceRoot/node_modules/.bin/ng run shared-ui:test-browser --no-progress
    inputs:
      - '**/*'
      - /tsconfig.json
      - /tsconfig.spec.json
    env:
      NODE_ENV: development
    options:
      runFromWorkspaceRoot: false
      cache: false
  test-unit-browser-ui:
    command: $workspaceRoot/node_modules/.bin/ng run shared-ui:test-browser --no-progress --ui --watch
    inputs:
      - '**/*'
      - /tsconfig.json
      - /tsconfig.spec.json
    env:
      NODE_ENV: development
    preset: server
    options:
      runFromWorkspaceRoot: false
language: typescript
layer: library
