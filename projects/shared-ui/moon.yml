$schema: https://moonrepo.dev/schemas/project.json
tasks:
  type-check:
    command: $workspaceRoot/node_modules/.bin/ngc --project tsconfig.lib.prod.json
    inputs:
      - '**/*'
      - /tsconfig.json
      - /tsconfig.lib.json
    env:
      NODE_ENV: development
    options:
      runFromWorkspaceRoot: false
  test-unit:
    command: $workspaceRoot/node_modules/.bin/ng test shared-ui
    inputs:
      - '**/*'
      - /tsconfig.json
      - /tsconfig.spec.json
    env:
      NODE_ENV: development
    options:
      runFromWorkspaceRoot: false
language: typescript
layer: library
