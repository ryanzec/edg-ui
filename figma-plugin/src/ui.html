<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Design System Generator</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #18181b;
        --fg-muted: #71717a;
        --border: #e4e4e7;
        --accent: #18a0fb;
        --accent-fg: #ffffff;
        --hover: #f4f4f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 12px 16px;
        font:
          12px / 1.4 'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          system-ui,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
      }

      h1 {
        margin: 0 0 4px 0;
        font-size: 13px;
        font-weight: 600;
      }

      p.lead {
        margin: 0 0 12px 0;
        color: var(--fg-muted);
      }

      fieldset {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 12px 10px;
        margin: 0 0 12px;
      }

      legend {
        padding: 0 6px;
        font-weight: 600;
        font-size: 11px;
      }

      label.checkbox {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 3px 0;
        cursor: pointer;
        user-select: none;
      }

      label.checkbox input {
        margin: 0;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }

      button {
        flex: 1;
        appearance: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg);
        color: var(--fg);
        font: inherit;
        font-weight: 500;
        padding: 7px 12px;
        cursor: pointer;
      }

      button:hover {
        background: var(--hover);
      }

      button.primary {
        background: var(--accent);
        color: var(--accent-fg);
        border-color: var(--accent);
      }

      button.primary:hover {
        filter: brightness(0.95);
      }

      .status {
        margin-top: 10px;
        padding: 8px 10px;
        border-radius: 6px;
        background: var(--hover);
        color: var(--fg-muted);
        min-height: 18px;
        font-variant-numeric: tabular-nums;
        white-space: pre-wrap;
      }

      .status.error {
        background: #fee2e2;
        color: #991b1b;
      }

      .status.success {
        background: #dcfce7;
        color: #166534;
      }

      .tip {
        margin-top: 10px;
        font-size: 11px;
        color: var(--fg-muted);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1>Design System Generator</h1>
    <p class="lead">Generates a figma library mirroring projects/shared-ui/src/lib/core.</p>

    <fieldset>
      <legend>Variables</legend>
      <label class="checkbox">
        <input type="checkbox" id="opt-variables" checked />
        Primitives + component-scoped (light/dark)
      </label>
    </fieldset>

    <fieldset>
      <legend>Components</legend>
      <label class="checkbox"><input type="checkbox" class="comp" value="button" checked /> button</label>
      <label class="checkbox"><input type="checkbox" class="comp" value="tag" checked /> tag</label>
      <label class="checkbox"><input type="checkbox" class="comp" value="input" checked /> input</label>
      <label class="checkbox"><input type="checkbox" class="comp" value="checkbox" checked /> checkbox</label>
      <label class="checkbox"><input type="checkbox" class="comp" value="radio" checked /> radio</label>
      <label class="checkbox"><input type="checkbox" class="comp" value="icon" checked /> icon</label>
      <label class="checkbox"><input type="checkbox" class="comp" value="label" checked /> label</label>
      <label class="checkbox"
        ><input type="checkbox" class="comp" value="loading-spinner" checked /> loading-spinner</label
      >
    </fieldset>

    <div class="actions">
      <button id="btn-cancel">Cancel</button>
      <button id="btn-generate" class="primary">Generate</button>
    </div>

    <div class="status" id="status">Ready.</div>

    <p class="tip">
      Re-running replaces existing variables and components by name. After generation, use File → Save local copy to
      save a .fig file.
    </p>

    <script>
      const statusEl = document.getElementById('status');
      const btnGenerate = document.getElementById('btn-generate');
      const btnCancel = document.getElementById('btn-cancel');

      function setStatus(text, kind) {
        statusEl.textContent = text;
        statusEl.className = 'status' + (kind ? ' ' + kind : '');
      }

      btnGenerate.addEventListener('click', () => {
        const includeVariables = document.getElementById('opt-variables').checked;
        const components = Array.from(document.querySelectorAll('input.comp:checked')).map((el) => el.value);

        setStatus('Generating…');
        btnGenerate.disabled = true;

        parent.postMessage({ pluginMessage: { type: 'generate', includeVariables, components } }, '*');
      });

      btnCancel.addEventListener('click', () => {
        parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
      });

      window.addEventListener('message', (event) => {
        const msg = event.data.pluginMessage;

        if (!msg) return;

        if (msg.type === 'progress') {
          setStatus(msg.message);
        } else if (msg.type === 'done') {
          setStatus(msg.message, 'success');
          btnGenerate.disabled = false;
        } else if (msg.type === 'error') {
          setStatus(msg.message, 'error');
          btnGenerate.disabled = false;
        }
      });
    </script>
  </body>
</html>
