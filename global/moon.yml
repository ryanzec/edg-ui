$schema: https://moonrepo.dev/schemas/project.json
tasks:
  deps:
    command: pnpm install
    inputs:
      - /pnpm-lock.yaml
      - /package.json
    options:
      runFromWorkspaceRoot: true
  setup-playwright:
    command: npx playwright install
    inputs:
      - /pnpm-lock.json
      - /package.json
    env:
      NODE_ENV: development
    options:
      runFromWorkspaceRoot: true
  setup-certs:
    options:
      runFromWorkspaceRoot: true
    script: sh -c "rm -f *.pem && mkcert -install -key-file ./ssl-key.pem -cert-file ./ssl-cert.pem localhost"
    env:
      NODE_ENV: development
    preset: server
  storybook:
    command: $workspaceRoot/node_modules/.bin/ng run storybook-host:storybook
    inputs:
      - /projects/**/*
    env:
      NODE_ENV: development
    options:
      runFromWorkspaceRoot: true
    preset: server
  storybook-clean:
    options:
      runFromWorkspaceRoot: true
    script: sh -c "rm -rf $workspaceRoot/node_modules/.cache/storybook && $workspaceRoot/node_modules/.bin/ng run storybook-host:storybook"
    env:
      NODE_ENV: development
    preset: server
  test-storybook:
    deps:
      - ~:setup-playwright
    options:
      runFromWorkspaceRoot: true
    inputs:
      - /.storybook/**/*
      - /projects/**/*
    env:
      NODE_ENV: development
    script: sh -c "$workspaceRoot/node_modules/.bin/ng run storybook-host:build-storybook && $workspaceRoot/.moon/scripts/run-storybook-tests.sh"
  generate:
    command: node $workspaceRoot/.moon/scripts/ng-generate-runner.cjs
    options:
      runFromWorkspaceRoot: true
      interactive: true
      cache: false
    env:
      NODE_ENV: development
  build-design-tokens:
    command: node $workspaceRoot/.moon/scripts/build-typescript-design-token.cjs
    options:
      runFromWorkspaceRoot: true
    env:
      NODE_ENV: development
    preset: server
  context-cost:
    command: node $workspaceRoot/.moon/scripts/token-calculator.cjs
    options:
      runFromWorkspaceRoot: true
      cache: false
    env:
      NODE_ENV: development
    preset: server
  sync-ai-files:
    options:
      runFromWorkspaceRoot: true
    script: sh -c "node $workspaceRoot/.moon/scripts/sync-claude-rules-to-cursor.cjs"
    env:
      NODE_ENV: development
    preset: server
  build-artifacts:
    deps:
      - ~:build-design-tokens
      - ~:sync-ai-files
    options:
      runFromWorkspaceRoot: true
    script: 'true'
    env:
      NODE_ENV: development
    preset: server
  lint:
    command: $workspaceRoot/node_modules/.bin/ng lint
    inputs:
      - /projects/**/*
      - /eslint.config.mjs
      - /angular.json
    env:
      NODE_ENV: development
    options:
      runFromWorkspaceRoot: true
  format:
    options:
      runFromWorkspaceRoot: true
    inputs:
      - /projects/**/*
      - /.prettierignore
      - /.prettierrc
      - /eslint.config.mjs
    env:
      NODE_ENV: development
    script: sh -c "$workspaceRoot/node_modules/.bin/prettier --config $workspaceRoot/.prettierrc --ignore-path $workspaceRoot/.prettierignore --write . && $workspaceRoot/node_modules/.bin/ng lint --fix"
  pnpm:
    command: pnpm -w
    options:
      runFromWorkspaceRoot: true
    env:
      NODE_ENV: development
    preset: server
  clean-cache:
    options:
      runFromWorkspaceRoot: true
    script: sh -c "rm -rf $workspaceRoot/.moon/cache && rm -rf $workspaceRoot/node_modules/.cache/storybook && rm -rf .angular && $workspaceRoot/node_modules/.bin/ng cache clean"
    env:
      NODE_ENV: development
    preset: server
  clean-nuke:
    options:
      runFromWorkspaceRoot: true
    script: |
      sh -c "
        $workspaceRoot/node_modules/.bin/ng cache clean && \
        rm -rf $workspaceRoot/.angular && \
        rm -rf $workspaceRoot/.moon/cache && \
        rm -rf $workspaceRoot/node_modules && \
        rm -rf $workspaceRoot/pnpm-lock.yaml && \
        rm -rf $workspaceRoot/dist && \
        rm -rf $workspaceRoot/out-tsc && \
        rm -rf $workspaceRoot/storybook-static && \
        $(moon bin pnpm) store prune
        moon run :deps
      "
    env:
      NODE_ENV: development
    preset: server
  ng-version:
    command: $workspaceRoot/node_modules/.bin/ng version
    options:
      runFromWorkspaceRoot: true
    env:
      NODE_ENV: development
    preset: server
  ng-update:
    command: $workspaceRoot/node_modules/.bin/ng update
    options:
      runFromWorkspaceRoot: true
    env:
      NODE_ENV: development
    preset: server
workspace:
  inheritedTasks:
    include: []
layer: tool
